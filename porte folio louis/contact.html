  <body>
    <header class="site-header"><div class="header-inner">
      <a class="brand" href="./index.html"><span class="brand-name">Louis Capronnier</span></a>
      <nav class="nav"><ul class="nav-list">
        <li><a class="nav-link" href="index.html">Accueil</a></li><li><a class="nav-link" href="apropos.html">À propos</a></li><li><a class="nav-link" href="competences.html">Compétences</a></li><li><a class="nav-link" href="e5.html">E5</a></li><li><a class="nav-link" href="e6.html">E6</a></li><li><a class="nav-link" href="veille-technologique.html">Veille technologique</a></li><li><a class="nav-link" href="contact.html">Contact</a></li>
      </ul></nav>
      <button id="themeToggle" class="icon-btn" type="button">🌙</button>
    </div></header>
    <main class="page">
      <section class="section reveal is-visible">
        <div class="container">
          <div class="section-header"><h1>Contact</h1><p class="section-lead">Tu peux me contacter via ce formulaire ou via mes réseaux.</p></div>
          <div class="two-cols">
            <form id="contactForm" class="card contact-card" novalidate>
              <div class="form-row"><label for="name">Nom</label><input id="name" name="name" type="text" required minlength="2" /></div>
              <div class="form-row"><label for="email">Email</label><input id="email" name="email" type="email" required /></div>
              <div class="form-row"><label for="message">Message</label><textarea id="message" name="message" rows="6" required minlength="10"></textarea></div>
              <button class="btn primary" type="submit">Envoyer</button>
              <p id="formStatus" class="form-status" aria-live="polite" role="status"></p>
            </form>
            <aside class="card">
              <h3>Liens</h3>
              <ul class="list">
                <li><a href="https://github.com/votre-utilisateur" target="_blank" rel="noopener noreferrer">GitHub</a></li>
                <li><a href="https://www.linkedin.com/in/votre-profil" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
              </ul>
            </aside>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="container footer-inner"><p>© <span id="year"></span> Louis Capronnier · <a href="mentions-legales.html">Mentions légales</a></p></div></footer>
